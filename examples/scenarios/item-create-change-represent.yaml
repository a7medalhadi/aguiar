name: item-create-change-represent
agent: example_agent
steps:
  - user: "Add a blue notebook with quantity 3"
  - expect_interrupt:
      where: { "payload.hitl.kind": "item_detail" }
  - respond: { action: change, value: "make the quantity 5" }
  - expect_interrupt:
      where: { "payload.hitl.kind": "item_detail" }
  - respond: { action: cancel }
assert:
  - eventually:
      event: interrupt
      where: { "payload.hitl.kind": "item_detail", "payload.hitl.id": "item-detail" }
      schema: ../schemas/item_detail.json
      schema_path: payload.hitl
      count: 2
  - paired: tool_calls
